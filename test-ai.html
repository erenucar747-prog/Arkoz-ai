<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Arkoz AI Test</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; background: #0a0a0a; color: #f0f0f0; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
    h1 { color: #B8A88A; margin-bottom: 20px; }
    #chat-box { width: 100%; max-width: 600px; background: #111; border: 1px solid #333; border-radius: 12px; overflow: hidden; }
    #messages { height: 400px; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
    .msg { max-width: 80%; padding: 10px 14px; border-radius: 12px; font-size: 0.9rem; line-height: 1.5; }
    .msg.user { background: #B8A88A; color: #0a0a0a; align-self: flex-end; }
    .msg.ai { background: #1e1e1e; color: #f0f0f0; align-self: flex-start; }
    .msg.typing { color: #888; font-style: italic; }
    #input-area { display: flex; border-top: 1px solid #333; padding: 12px; gap: 8px; }
    #user-input { flex: 1; background: #1e1e1e; border: 1px solid #444; border-radius: 8px; color: #f0f0f0; padding: 10px 14px; font-size: 0.9rem; outline: none; }
    #send-btn { background: #B8A88A; color: #0a0a0a; border: none; border-radius: 8px; padding: 10px 18px; font-weight: 600; cursor: pointer; }
    #send-btn:disabled { opacity: 0.5; }
    #status { margin-top: 12px; font-size: 0.8rem; text-align: center; }
    #status.error { color: #ff6b6b; }
    #status.ok { color: #6bff8e; }
  </style>
</head>
<body>
  <h1>Arkoz AI Test</h1>
  <div id="chat-box">
    <div id="messages">
      <div class="msg ai">Merhaba! Ben Arkoz Gazbeton'un asistanıyım. Size nasıl yardımcı olabilirim?</div>
    </div>
    <div id="input-area">
      <input id="user-input" type="text" placeholder="Mesajınızı yazın..." />
      <button id="send-btn">Gönder</button>
    </div>
  </div>
  <div id="status"></div>
  <script>
    const WORKER_URL = 'https://arkoz-ai.vercel.app/api/chat';
    const messages = document.getElementById('messages');
    const input = document.getElementById('user-input');
    const btn = document.getElementById('send-btn');
    const status = document.getElementById('status');
    const history = [];
    function addMsg(text, role) {
      const div = document.createElement('div');
      div.className = 'msg ' + (role === 'user' ? 'user' : 'ai');
      div.textContent = text;
      messages.appendChild(div);
      messages.scrollTop = messages.scrollHeight;
      return div;
    }
    async function send() {
      const text = input.value.trim();
      if (!text) return;
      input.value = '';
      btn.disabled = true;
      status.textContent = '';
      status.className = '';
      addMsg(text, 'user');
      history.push({ role: 'user', content: text });
      const typing = addMsg('Yazıyor...', 'ai');
      typing.classList.add('typing');
      try {
        const res = await fetch(WORKER_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ messages: history }),
        });
        const data = await res.json();
        if (data.error) {
          typing.remove();
          status.textContent = 'Hata: ' + (data.error.message || JSON.stringify(data.error));
          status.className = 'error';
        } else {
          const reply = data.content[0].text;
          typing.textContent = reply;
          typing.classList.remove('typing');
          history.push({ role: 'assistant', content: reply });
          status.textContent = 'Bağlantı başarılı';
          status.className = 'ok';
        }
      } catch (err) {
        typing.remove();
        status.textContent = 'Bağlantı hatası: ' + err.message;
        status.className = 'error';
      }
      btn.disabled = false;
    }
    btn.addEventListener('click', send);
    input.addEventListener('keydown', e => { if (e.key === 'Enter') send(); });
  </script>
</body>
</html>
